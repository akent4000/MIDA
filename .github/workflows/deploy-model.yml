name: Deploy Model to Prod

# Triggered by tagging the repo with v*. Pulls the chosen single + 5 fold
# checkpoints from MinIO, exports each to ONNX, INT8-quantizes them using a
# small RSNA calibration sample (also pulled from MinIO), scp's the result
# to the prod server, and asks Celery to restart picking up the new files.
#
# Required secrets:
#   SSH_PRIVATE_KEY   — deploy key for the prod server
#   SSH_HOST_KEY      — output of `ssh-keyscan <host>` for known_hosts
#   PROD_HOST         — e.g. mida.akent.site
#   PROD_USER         — e.g. mida-deploy
#   MINIO_ENDPOINT    — https://s3.mida.akent.site
#   MINIO_ACCESS_KEY
#   MINIO_SECRET_KEY

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      single_ckpt_key:
        description: "MinIO key of the single-fold .pt"
        default: weights/finetune_rsna_densenet121_384_20260424_083946/best.pt
      ensemble_prefix:
        description: "Prefix matching the 5 CV-fold .pt files in MinIO"
        default: weights/cv_rsna_densenet121_384_fold

permissions:
  contents: read

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest

    env:
      SINGLE_CKPT_KEY: ${{ inputs.single_ckpt_key || 'weights/finetune_rsna_densenet121_384_20260424_083946/best.pt' }}
      ENSEMBLE_PREFIX: ${{ inputs.ensemble_prefix || 'weights/cv_rsna_densenet121_384_fold' }}
      WORK_DIR: /tmp/mida-deploy

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ONNX export deps (CPU only — no CUDA in CI)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Install mc (MinIO Client)
        run: |
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o "$HOME/.local/bin/mc"
          chmod +x "$HOME/.local/bin/mc"
          mc alias set mida "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}

      - name: Pull checkpoints from MinIO
        run: |
          mkdir -p "$WORK_DIR/ckpts" "$WORK_DIR/onnx" "$WORK_DIR/calibration"
          mc cp "mida/mida-models/$SINGLE_CKPT_KEY" "$WORK_DIR/ckpts/single.pt"
          # Pull every fold-checkpoint matching the prefix (5 expected for RSNA CV).
          mc find "mida/mida-models/" --name "best.pt" --path "*${ENSEMBLE_PREFIX}*" \
            | while read -r src; do
                fold=$(echo "$src" | grep -oE "fold[0-9]+" | head -n1)
                mc cp "$src" "$WORK_DIR/ckpts/${fold}.pt"
              done
          ls -la "$WORK_DIR/ckpts"

      - name: Pull a calibration sample (200 RSNA dicoms)
        run: |
          # mc cp has no --limit flag, so we list-and-cherry-pick instead.
          # quantize_int8.py samples 200 from whatever is on disk.
          mc find "mida/mida-data/rsna/stage_2_train_images/" --name "*.dcm" 2>/dev/null \
            | head -n 250 \
            | while read -r src; do
                mc cp "$src" "$WORK_DIR/calibration/" >/dev/null
              done || true
          # Fall back to pure-FP32 ONNX if the bucket isn't seeded.
          n=$(ls -1 "$WORK_DIR/calibration" 2>/dev/null | wc -l)
          if [ "$n" -ge 200 ]; then
              echo "QUANTIZE=true" >> "$GITHUB_ENV"
              echo "Calibration: $n samples"
          else
              echo "QUANTIZE=false" >> "$GITHUB_ENV"
              echo "Calibration data missing or too small ($n) — shipping FP32"
          fi

      - name: Export FP32 ONNX
        run: |
          for pt in "$WORK_DIR/ckpts/"*.pt; do
            name=$(basename "$pt" .pt)
            python -m backend.ml.export.export_onnx \
              --checkpoint "$pt" \
              --out "$WORK_DIR/onnx/${name}.onnx"
          done

      - name: Quantize INT8 (if calibration data present)
        if: ${{ env.QUANTIZE == 'true' }}
        run: |
          for fp32 in "$WORK_DIR/onnx/"*.onnx; do
            name=$(basename "$fp32" .onnx)
            python -m backend.ml.export.quantize_int8 \
              --fp32 "$fp32" \
              --int8 "$WORK_DIR/onnx/${name}-int8.onnx" \
              --calibration-dir "$WORK_DIR/calibration" \
              --num-samples 200
          done

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_HOST_KEY }}" >> ~/.ssh/known_hosts
          # Single 'prod' alias — keeps subsequent ssh/rsync commands clean
          # and centralises the non-default port in one place.
          cat > ~/.ssh/config <<EOF
          Host prod
            HostName ${{ secrets.PROD_HOST }}
            Port ${{ secrets.PROD_SSH_PORT }}
            User ${{ secrets.PROD_USER }}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Upload models to prod
        run: |
          # Prefer INT8 on prod; fall back to FP32 if quantize was skipped.
          shopt -s nullglob
          if compgen -G "$WORK_DIR/onnx/*-int8.onnx" >/dev/null; then
              models=("$WORK_DIR/onnx/"*-int8.onnx)
          else
              models=("$WORK_DIR/onnx/"*.onnx)
          fi
          rsync -av --delete "${models[@]}" prod:/srv/mida/models/

      - name: Restart Celery worker on prod
        run: |
          ssh prod "cd /srv/mida && docker compose --env-file .env.prod -f docker-compose.prod.yml restart worker backend"
