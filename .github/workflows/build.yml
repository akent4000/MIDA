name: Build & Publish Images

# Builds the backend (prod target) and frontend Docker images and pushes them
# to GHCR. Triggers only after CI passes on a push to main, so we don't ship
# images that fail tests.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          # Build the same SHA CI tested, not the tip of main.
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build & push mida-backend (prod)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/backend.Dockerfile
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mida-backend:latest
            ghcr.io/${{ github.repository_owner }}/mida-backend:${{ steps.tags.outputs.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push mida-frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/frontend.Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=https://api.mida.akent.site
          tags: |
            ghcr.io/${{ github.repository_owner }}/mida-frontend:latest
            ghcr.io/${{ github.repository_owner }}/mida-frontend:${{ steps.tags.outputs.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
