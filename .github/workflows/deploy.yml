name: Deploy to Production

# Runs after Build & Publish Images succeeds on main.
# Chain: CI → Build → Deploy
#
# Secret schema (shared with deploy-model.yml):
#   SSH_PRIVATE_KEY   — deploy key for the prod server
#   PROD_HOST         — e.g. mida.akent.site
#   PROD_SSH_PORT     — non-default SSH port on the prod server
#   PROD_USER         — e.g. mida-deploy
#   PROD_DEPLOY_PATH  — repo root on prod (compose at $PROD_DEPLOY_PATH/infra).
#                       Optional; defaults to /opt/MIDA.
#   GHCR_PULL_TOKEN   — optional. PAT with `read:packages` scope for the prod
#                       server. Only required if GHCR images become private.

on:
  workflow_run:
    workflows: ["Build & Publish Images"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH || '/opt/MIDA' }}
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        with:
          host: ${{ secrets.PROD_HOST }}
          port: ${{ secrets.PROD_SSH_PORT }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: PROD_DEPLOY_PATH,GHCR_USER,GHCR_PULL_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            cd "${PROD_DEPLOY_PATH}/infra"

            # External docker network must exist before any compose touches it.
            # Idempotent — only creates on a fresh server.
            docker network inspect mida-net >/dev/null 2>&1 \
              || docker network create mida-net

            # Fail loudly if .env.prod is missing — silently falling back to
            # compose defaults would create a broken stack with weak creds.
            if [ ! -f .env.prod ]; then
              echo "ERROR: .env.prod missing at $(pwd)." >&2
              echo "       Copy .env.prod.example, fill in real values, retry." >&2
              exit 1
            fi

            # GHCR auth — required only if packages are private. Skips silently
            # when GHCR_PULL_TOKEN isn't set so public-image deploys still work.
            if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              echo "$GHCR_PULL_TOKEN" \
                | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi

            COMPOSE_MAIN="docker compose --env-file .env.prod -f docker-compose.prod.yml"
            COMPOSE_MINIO="docker compose --env-file .env.prod -f docker-compose.minio.yml"

            # MinIO is in its own compose; keep it running alongside the app.
            # Idempotent — `up -d` is a no-op when already healthy.
            $COMPOSE_MINIO up -d

            $COMPOSE_MAIN pull
            # Datastores first so the one-shot migrator has a target but no
            # app container is yet serving requests against the old schema.
            $COMPOSE_MAIN up -d postgres redis
            $COMPOSE_MAIN run --rm backend alembic upgrade head
            # Now bring up backend/worker/frontend against the migrated DB.
            $COMPOSE_MAIN up -d
            echo "Deploy done: $(date -u)"
