name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Fast lint — no torch needed, runs in parallel with test ────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps (no torch)
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy backend/

  # ── Tests — torch CPU in a cached venv so reinstall is skipped on hits ────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Cache the entire virtualenv (not just pip wheels) so we skip the
      # torch install step (~3-4 min) on cache hits.
      # restore-keys falls back to any torch-cpu venv when pyproject.toml
      # changes, then only the delta is re-installed below.
      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: ${{ runner.os }}-venv-py311-torch-cpu-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-venv-py311-torch-cpu-

      - name: Install PyTorch + project (cache miss only)
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          .venv/bin/pip install -e ".[dev]"

      # Always re-link the editable install so source changes are picked up.
      # --no-deps skips the slow dependency resolution step.
      - name: Sync editable install
        run: .venv/bin/pip install -e "." --no-deps

      - name: Test (pytest)
        run: .venv/bin/pytest --cov=backend --cov-report=term-missing
