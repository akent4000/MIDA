services:
  postgres:
    image: postgres:16-alpine
    container_name: mira-dev-postgres
    environment:
      POSTGRES_USER: mira
      POSTGRES_PASSWORD: mira
      POSTGRES_DB: mira
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - mira_dev_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mira -d mira"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mira-dev-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - mira_dev_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mira-dev-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - mira_dev_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Creates the bucket once MinIO is up. Exits immediately after.
  minio-init:
    image: minio/mc:latest
    container_name: mira-dev-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/mida-studies &&
        echo 'bucket ready'
      "
    restart: "no"

volumes:
  mira_dev_pg:
  mira_dev_redis:
  mira_dev_minio:
